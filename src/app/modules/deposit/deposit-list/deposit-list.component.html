@if (isLoading$ | async) {
<div class="deposit-list__loading">
    <mat-spinner></mat-spinner>
</div>
} @else {
<div class="deposit-list__container">
    @let deposits = deposits$ | async;

    @if (deposits?.length === 0) {
    <div class="deposit-list__no-deposits">
        <h2 class="deposit-list__no-deposits-title">У вас пока нет вкладов</h2>
        <p class="deposit-list__no-deposits-text">
            оздайте первый вклад и начните накапливать средства с выгодной процентной ставкой
        </p>
        <button class="deposit-list__create-button" mat-raised-button (click)="onCreateDeposit()">
            Создать новый вклад
        </button>
    </div>
    } @else {
    <section class="deposit-list__deposit-list">
        @for (deposit of deposits; track deposit.id) {
        <banking-deposit-card class="deposit-list__deposit-item" [deposit]="deposit" (delete)="onDelete($event)">
        </banking-deposit-card>
        }
    </section>
    }
</div>
}
