@if (isLoading$ | async) {
<div class="deposit-list__loading">
  <mat-spinner></mat-spinner>
</div>
} @else {
<div class="deposit-list__container">
  <header class="deposit-list__header">
    <banking-create-button (click)="onCreateDeposit()">Создать новый вклад</banking-create-button>
  </header>

  @let deposits = deposits$ | async;
  @if (deposits?.length === 0) {
  <banking-empty-state>
    <ng-container empty-title>У вас пока нет вкладов</ng-container>
    <ng-container empty-message>
      Создайте первый вклад и начните накапливать средства с выгодной процентной ставкой
    </ng-container>
  </banking-empty-state>
  }

  <section class="deposit-list__deposit-list">
    @for (deposit of deposits; track deposit.id) {
    <banking-deposit-card class="deposit-list__deposit-item" [deposit]="deposit" (delete)="onDelete($event)">
    </banking-deposit-card>
    }
  </section>
</div>
}
