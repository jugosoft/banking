<div class="confirm-delete-dialog__container">
  <h2 class="confirm-delete-dialog__title">{{ data.title }}</h2>
  <p class="confirm-delete-dialog__content">{{ data.message }}</p>
  <div class="confirm-delete-dialog__actions">
    <button mat-button mat-dialog-close cdkFocusInitial>
      {{ data.cancelText || 'Отмена' }}
    </button>
    <button mat-raised-button color="warn" [mat-dialog-close]="true">
      {{ data.confirmText || 'Удалить' }}
    </button>
  </div>
</div>
