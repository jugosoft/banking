@if (!user) {
<mat-spinner></mat-spinner>
} @else {
<div class="profile__container">
  <banking-personal-info [user]="user" (save)="onPersonalInfoSave($event)"></banking-personal-info>

  <banking-contact-info [user]="user" (save)="onContactInfoSave($event)"></banking-contact-info>

  <banking-security (save)="onSecuritySave($event)"></banking-security>
</div>
}
