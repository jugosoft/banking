@if (isLoading$ | async) {
<mat-spinner></mat-spinner>
} @else {
@if ((deposits$ | async)?.length === 0) {
<div class="home__no-deposits">
    <p>У вас пока нет вкладов</p>
    <button mat-raised-button color="primary" (click)="onCreateDeposit()">Создать новый вклад</button>
</div>
} @else {
<section class="home__deposit-list">
    @for (deposit of deposits$ | async; track deposit.id) {
    <banking-deposit-card class="home__deposit-item" [deposit]="deposit" (delete)="onDelete($event)">
    </banking-deposit-card>
    }
</section>
}
}
