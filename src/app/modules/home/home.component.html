@if (isLoading$ | async) {
<div class="home__loading">
    <mat-spinner></mat-spinner>
</div>
} @else {
<div class="home__container">
    <header class="home__header">
        <h1 class="home__title">Мои вклады</h1>
    </header>

    @if ((deposits$ | async)?.length === 0) {
    <div class="home__no-deposits">
        <h2 class="home__no-deposits-title">У вас пока нет вкладов</h2>
        <p class="home__no-deposits-text">Создайте первый вклад и начните накапливать средства с выгодной процентной
            ставкой</p>
        <button class="home__create-button" mat-raised-button (click)="onCreateDeposit()">
            Создать новый вклад
        </button>
    </div>
    } @else {
    <section class="home__deposit-list">
        @for (deposit of deposits$ | async; track deposit.id) {
        <banking-deposit-card class="home__deposit-item" [deposit]="deposit" (delete)="onDelete($event)">
        </banking-deposit-card>
        }
    </section>
    }
</div>
}
