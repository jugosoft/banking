@if (isLoading$ | async) {
<mat-spinner></mat-spinner>
} @else {
<div class="home__container">
    <app-deposit-banner [deposits]="[]"></app-deposit-banner>

    @let deposits = deposits$ | async;

    @if (deposits?.length === 0) {
    <div class="home__container-item">
        <banking-empty-state (createDeposit)="onCreateDeposit()"></banking-empty-state>
    </div>
    } @else {
    <div class="home__container-item">
        <section class="home__deposit-list">
            @for (deposit of deposits; track deposit.id) {
            <banking-deposit-card class="home__deposit-item" [deposit]="deposit" (delete)="onDelete($event)">
            </banking-deposit-card>
            }
        </section>
    </div>
    }
</div>
}
