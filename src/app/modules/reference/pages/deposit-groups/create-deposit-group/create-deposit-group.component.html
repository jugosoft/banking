<div class="deposit-groups__container">
  <div class="deposit-groups__header">
    <h1 class="deposit-groups__title">Группы сбережений</h1>
    <button mat-raised-button color="primary" (click)="onCreate()">
      <mat-icon>add</mat-icon>
      Добавить группу
    </button>
  </div>

  <!-- Форма редактирования -->
  <div class="deposit-groups__form-container" *ngIf="formGroup">
    <h2 class="deposit-groups__form-title">
      {{ isEdit ? 'Редактирование группы' : 'Создание группы' }}
    </h2>
    <form [formGroup]="formGroup" (ngSubmit)="onSubmit()" class="deposit-groups__form">
      <mat-form-field>
        <mat-label>Код</mat-label>
        <input matInput formControlName="code" placeholder="Введите код группы" required />
        <mat-error *ngIf="formGroup.get('code')?.hasError('required')">Код обязателен</mat-error>
      </mat-form-field>

      <mat-form-field>
        <mat-label>Наименование</mat-label>
        <input matInput formControlName="name" placeholder="Введите наименование группы" required />
        <mat-error *ngIf="formGroup.get('name')?.hasError('required')">Наименование обязательно</mat-error>
      </mat-form-field>

      <button mat-raised-button type="submit" [disabled]="formGroup.invalid">
        {{ isEdit ? 'Сохранить' : 'Создать' }}
      </button>
      <button mat-button type="button" (click)="onCancel()" *ngIf="isEdit">
        Отмена
      </button>
    </form>
  </div>

  <div class="deposit-groups__table-container">
    <table mat-table [dataSource]="depositGroups" class="deposit-groups__table">
      <!-- ID Column -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let element"> {{element.id}} </td>
      </ng-container>

      <!-- Code Column -->
      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef> Код </th>
        <td mat-cell *matCellDef="let element"> {{element.code}} </td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Название </th>
        <td mat-cell *matCellDef="let element"> {{element.name}} </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Действия </th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="primary" (click)="onEdit(element.id)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="onDelete(element.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
