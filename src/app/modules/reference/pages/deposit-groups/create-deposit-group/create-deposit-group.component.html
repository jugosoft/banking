<form [formGroup]="formGroup" (ngSubmit)="onSubmit()" class="create-deposit-group__form">
  <mat-form-field>
    <mat-label>Код</mat-label>
    <input matInput formControlName="code" placeholder="Введите код группы" required />
    <mat-error *ngIf="formGroup.get('code')?.hasError('required')">Код обязателен</mat-error>
  </mat-form-field>

  <mat-form-field>
    <mat-label>Наименование</mat-label>
    <input matInput formControlName="name" placeholder="Введите наименование группы" required />
    <mat-error *ngIf="formGroup.get('name')?.hasError('required')">Наименование обязательно</mat-error>
  </mat-form-field>

  <button mat-raised-button type="submit" [disabled]="formGroup.invalid">
    {{ isEdit ? 'Сохранить' : 'Создать' }}
  </button>
</form>
