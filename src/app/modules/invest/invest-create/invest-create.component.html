<h2>Новая инвестиция</h2>

<form [formGroup]="form" (ngSubmit)="onSubmit()" class="invest-create__form">

    <mat-form-field>
        <mat-label>Банк</mat-label>
        <mat-select [compareWith]="compareFn" formControlName="bank">
            @for (bank of banks$ | async; track bank.id) {
            <mat-option [value]="bank">{{ bank.shortName }}</mat-option>
            }
        </mat-select>
    </mat-form-field>

    <mat-form-field>
        <mat-label>Тип продукта</mat-label>
        <mat-select [compareWith]="compareFn" formControlName="depositType">
            @for (type of depositTypes$ | async; track type.id) {
            <mat-option [value]="type">{{ type.name }}</mat-option>
            }
        </mat-select>
    </mat-form-field>


    <mat-form-field>
        <mat-label for="amount">Сумма</mat-label>
        <input matInput type="number" formControlName="amount" placeholder="Введите сумму инвестиции" min="0"
            step="0.01" />
    </mat-form-field>

    <mat-form-field>
        <mat-label>Дата начала</mat-label>
        <input matInput [matDatepicker]="startDatePicker" formControlName="startDate">
        <mat-hint>ММ.ДД.ГГГГ</mat-hint>
        <mat-datepicker-toggle matIconSuffix [for]="startDatePicker"></mat-datepicker-toggle>
        <mat-datepicker #startDatePicker></mat-datepicker>
        <!-- @if (formGroup.get('endDate')?.touched && !isEndDateValid()) {
      <mat-error>Дата закрытия не может быть раньше даты начала</mat-error>
      } -->
    </mat-form-field>

    <button mat-raised-button type="submit" (click)="onSubmit()">Создать</button>
</form>
